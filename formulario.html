<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Formulários</title>
</head>
<body>
    <form method="GET" action="formulario_retorno.html">
        <label for="txt_nome">Nome: </label>
        <input type="text" name="txt_nome"><br>
        <label for="rb_sexo">Sexo: </label>
        <input type="radio" name="rb_sexo" Value="M" checked/>
        Masculino
        <input type="radio" name="rb_sexo" Value="F" checked/>
        Feminino
        <input type="radio" name="rb_sexo" Value="O" checked/>
        Outros
        <br>
        <label for="cb_carro">Tenho Carro Própio</label>
        <input type="checkbox" value="S"/>
        <br>
        <label for="sel_uf">UF</label>
        <select name="sel_uf">
            <option value="MG">Minas Gerais</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="SP">São Paulo</option>
            <option value="BA">Bahia</option>
        </select>
        <br>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </form>
    <fieldset>
        <legend>Aviso</legend>
        <p>Preencha os dados e clique em enviar</p>
    </fieldset>
</body>
</html>
